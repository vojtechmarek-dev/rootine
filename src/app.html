<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
        <meta name="theme-color" content="#fafafa" media="(prefers-color-scheme: light)" />
        <meta name="theme-color" content="#18181b" media="(prefers-color-scheme: dark)" />
        <script>
            // Prevent FOUC (Flash of Unstyled Content): Apply theme before body renders
            !function(){try{const d=document.documentElement,c=localStorage.getItem('rootine.theme.mode'),m=c==='light'||c==='dark'||c==='system'?c:'system',p=localStorage.getItem('rootine.theme.preset')==='zinc'?'zinc':'zinc',s=window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light',r=m==='system'?s:m;d.dataset.theme=p;d.dataset.mode=r;d.classList.toggle('dark',r==='dark');d.style.colorScheme=r}catch(e){}}();
        </script>
        %sveltekit.head%
    </head>
    <body data-sveltekit-preload-data="hover">
        <div style="display: contents">%sveltekit.body%</div>
    </body>
</html>
